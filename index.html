<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>中文範文詞解練習</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>範文詞解全量練習</h1>
        
        <div id="menu">
            <button onclick="startQuiz('shisanshou')">詩三首 (全量)</button>
            <button onclick="startQuiz('cisanshou')">詞三首 (全量)</button>
            <button disabled>岳陽樓記 (整理中)</button>
        </div>

        <div id="quiz-container" style="display:none;">
            <h2 id="quiz-title"></h2>
            <div id="question-box">
                <p id="question-text"></p>
                <p id="pronunciation" style="color: #666; font-size: 0.9em;"></p>
            </div>
            
            <div id="answer-box" style="display:none;">
                <hr>
                <p><strong>答案：</strong> <span id="answer-text"></span></p>
            </div>

            <div class="controls">
                <button id="show-btn" onclick="showAnswer()">顯示答案</button>
                <button id="next-btn" onclick="nextQuestion()" style="display:none;">下一題</button>
                <button onclick="backToMenu()">返回選單</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
